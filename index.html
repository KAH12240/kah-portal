<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAH Licensing Document Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #f6f8f6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://tjvzvwbtmilknguywdse.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6gAsF5-FGs3SiEx-V2WL6Q_nenqNO5q";
    const TABLE = "submissions";
    const ADMIN_PASSWORD = "KAH12345";

    const CENTERS = [
      "KAH @ Barnsley Elementary","KAH @ Bayard Rustin Elementary","KAH @ Burtonsville Elementary",
      "KAH @ Cannon Road Elementary","KAH @ Carderock Springs Elementary","KAH @ Cloverly Elementary",
      "KAH @ Fairland Elementary","KAH @ Farmland Elementary","KAH @ Flora Singer Elementary",
      "KAH @ Flower Valley Elementary","KAH @ Forest Knolls Elementary","KAH @ Freedom Elementary",
      "KAH @ Garrett Park Elementary","KAH @ Glenallan Elementary","KAH @ Glen Haven Elementary",
      "KAH @ Greencastle Elementary","KAH @ Highland View Elementary","KAH @ Meadow Hall Elementary",
      "KAH @ North Chevy Chase Elementary","KAH @ Oakland Terrace Elementary","KAH @ Page Elementary",
      "KAH @ Red Barn Ranch","KAH @ Rock View Elementary","KAH @ Rosemary Hills Elementary",
      "KAH @ Sargent Shriver Elementary","KAH @ Taneytown Elementary","KAH @ Westbrook Elementary",
      "KAH @ Westover Elementary","KAH @ Woodlin Elementary",
    ];

    const DOC_TYPES = [
      { id:"staffing",    label:"Staffing Patterns",     icon:"📊", color:"#2D6A4F" },
      { id:"personnel",  label:"Personnel List",         icon:"👥", color:"#1D3557" },
      { id:"development",label:"Staff Development Plan", icon:"📈", color:"#6B4226" },
      { id:"orientation",label:"Orientation",            icon:"📋", color:"#7B2D8B" },
    ];

    const hdrs = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    };

    async function fetchSubmissions() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=submitted_at.desc`, { headers: hdrs });
      if (!res.ok) throw new Error("Failed to load submissions");
      return res.json();
    }

    async function insertSubmission(row) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: "POST",
        headers: { ...hdrs, "Prefer": "return=representation" },
        body: JSON.stringify(row),
      });
      if (!res.ok) throw new Error("Failed to save submission");
      return res.json();
    }

    function fmtSize(b) {
      if (!b) return "";
      if (b < 1024) return b + " B";
      if (b < 1048576) return (b/1024).toFixed(1) + " KB";
      return (b/1048576).toFixed(1) + " MB";
    }

    function fmtDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});
    }

    function readFileAsDataUrl(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload  = () => res({ name:file.name, size:file.size, type:file.type, dataUrl:r.result });
        r.onerror = () => rej(new Error("Failed to read " + file.name));
        r.readAsDataURL(file);
      });
    }

    function dlFile(f) {
      const a = document.createElement("a");
      a.href = f.dataUrl; a.download = f.name; a.click();
    }

    function Toast({ toast }) {
      return (
        <div style={{...S.toast, background: toast.err ? "#c0392b" : "#2D6A4F"}}>
          {toast.err ? "⚠️" : "✅"} {toast.msg}
        </div>
      );
    }

    function Header({ role, onSwitch }) {
      const logoUrl = "https://kah12240.github.io/kah-fleet/kah-logo.png";
      return (
        <div style={S.header}>
          <div style={S.headerLeft}>
            <img src={logoUrl} alt="KAH" style={{height:46, objectFit:"contain"}} />
            <div>
              <div style={S.headerTitle}>Maryland Childcare Licensing Portal</div>
              <div style={S.headerRole}>{role === "director" ? "Director Submission View" : "Admin / Owner View"}</div>
            </div>
          </div>
          <button style={S.switchBtn} onClick={onSwitch}>Switch Role ↩</button>
        </div>
      );
    }

    function DirectorView({ showToast }) {
      const [center,   setCenter]   = useState("");
      const [docType,  setDocType]  = useState("");
      const [notes,    setNotes]    = useState("");
      const [staged,   setStaged]   = useState([]);
      const [dragOver, setDragOver] = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [saving,   setSaving]   = useState(false);
      const [done,     setDone]     = useState(false);
      const fileRef = useRef();

      const handleFiles = async (files) => {
        setLoading(true);
        try {
          const converted = await Promise.all(Array.from(files).map(readFileAsDataUrl));
          setStaged(prev => {
            const names = new Set(prev.map(f => f.name));
            return [...prev, ...converted.filter(f => !names.has(f.name))];
          });
        } catch(e) { showToast("Error reading file: " + e.message, true); }
        setLoading(false);
      };

      const handleSubmit = async () => {
        if (!center || !docType || staged.length === 0) {
          showToast("Please fill in all fields and attach at least one file.", true);
          return;
        }
        setSaving(true);
        try {
          const id = "sub_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
          const row = {
            id,
            center,
            doc_type: docType,
            notes: notes || null,
            files: JSON.stringify(staged),
            submitted_at: Date.now(),
          };
          await insertSubmission(row);
          setStaged([]); setDocType(""); setNotes(""); setDone(true);
          showToast("Documents submitted successfully!");
        } catch(e) {
          showToast("Save failed: " + e.message, true);
        }
        setSaving(false);
      };

      return (
        <div style={S.container}>
          {done && (
            <div style={S.successBanner}>
              ✅ Submission received! You may submit additional documents below.
              <button style={S.dismissBtn} onClick={() => setDone(false)}>Dismiss</button>
            </div>
          )}
          <div style={S.card}>
            <h2 style={S.cardTitle}>Submit Licensing Documents</h2>

            <label style={S.label}>Your Center *</label>
            <select style={S.select} value={center} onChange={e => setCenter(e.target.value)}>
              <option value="">— Select your center —</option>
              {CENTERS.map(c => <option key={c}>{c}</option>)}
            </select>

            <label style={S.label}>Document Type *</label>
            <div style={S.docTypeGrid}>
              {DOC_TYPES.map(dt => (
                <button key={dt.id}
                  style={{...S.docTypeBtn, ...(docType===dt.id ? {borderColor:dt.color, background:dt.color+"12"} : {})}}
                  onClick={() => setDocType(dt.id)}>
                  <span style={{fontSize:22}}>{dt.icon}</span>
                  <span style={{fontSize:12, color:docType===dt.id?dt.color:"#444", fontWeight:docType===dt.id?700:500, textAlign:"center", lineHeight:1.3}}>{dt.label}</span>
                </button>
              ))}
            </div>

            <label style={S.label}>Upload Documents *</label>
            <div
              style={{...S.dropzone, ...(dragOver ? S.dropzoneActive : {})}}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
              onClick={() => fileRef.current.click()}>
              <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e => handleFiles(e.target.files)} />
              <span style={{fontSize:32}}>{loading ? "⏳" : "📁"}</span>
              <p style={S.dropzoneText}>{loading ? "Reading files…" : "Drag & drop files here, or "}<span style={S.browseLink}>{loading ? "" : "browse"}</span></p>
              <p style={S.dropzoneHint}>PDF, JPG, PNG, DOCX accepted</p>
            </div>

            {staged.length > 0 && (
              <div style={S.fileList}>
                {staged.map(f => (
                  <div key={f.name} style={S.fileChip}>
                    <span>📄 {f.name}</span>
                    <span style={S.fileSize}>{fmtSize(f.size)}</span>
                    <button style={S.removeFile} onClick={() => setStaged(prev => prev.filter(x => x.name !== f.name))}>✕</button>
                  </div>
                ))}
              </div>
            )}

            <label style={S.label}>Notes (optional)</label>
            <textarea style={S.textarea} rows={3} placeholder="Any additional context…" value={notes} onChange={e => setNotes(e.target.value)} />

            <button style={{...S.submitBtn, opacity:(loading||saving)?0.6:1}} onClick={handleSubmit} disabled={loading||saving}>
              {saving ? "Saving…" : "Submit Documents →"}
            </button>
          </div>
        </div>
      );
    }

    function AdminView({ showToast }) {
      const [submissions,  setSubmissions]  = useState([]);
      const [loading,      setLoading]      = useState(true);
      const [tab,          setTab]          = useState("submissions");
      const [filterCenter, setFilterCenter] = useState("all");
      const [filterType,   setFilterType]   = useState("all");

      useEffect(() => {
        fetchSubmissions()
          .then(rows => {
            const parsed = rows.map(r => ({
              ...r,
              files: (() => { try { return typeof r.files === "string" ? JSON.parse(r.files) : (r.files || []); } catch(e) { return []; } })(),
            }));
            setSubmissions(parsed);
          })
          .catch(e => showToast("Failed to load: " + e.message, true))
          .finally(() => setLoading(false));
      }, []);

      const submittedCenters = new Set(submissions.map(s => s.center));
      const missingCenters   = CENTERS.filter(c => !submittedCenters.has(c));

      const filtered = submissions.filter(s => {
        if (filterCenter !== "all" && s.center !== filterCenter) return false;
        if (filterType   !== "all" && s.doc_type !== filterType) return false;
        return true;
      });

      const grouped = CENTERS.reduce((acc, c) => {
        const subs = filtered.filter(s => s.center === c);
        if (subs.length) acc[c] = subs;
        return acc;
      }, {});

      const getDt = (id) => DOC_TYPES.find(d => d.id === id) || { label: id, icon: "📄", color: "#888" };

      const downloadAll = (sub) => {
        if (!sub.files || sub.files.length === 0) { showToast("No downloadable files.", true); return; }
        sub.files.forEach(dlFile);
        showToast("Downloading " + sub.files.length + " file(s)");
      };

      if (loading) return (
        <div style={S.emptyState}>
          <span style={{fontSize:48}}>⏳</span>
          <p style={{color:"#777"}}>Loading submissions…</p>
        </div>
      );

      return (
        <div style={S.container}>
          <div style={S.tabRow}>
            <button style={{...S.tab, ...(tab==="submissions" ? S.tabActive : {})}} onClick={() => setTab("submissions")}>
              📋 Submissions {submissions.length > 0 && <span style={S.tabBadge}>{submissions.length}</span>}
            </button>
            <button style={{...S.tab, ...(tab==="missing" ? S.tabActive : {})}} onClick={() => setTab("missing")}>
              ⚠️ No Uploads Yet <span style={{...S.tabBadge, background: missingCenters.length > 0 ? "#c0392b" : "#2D6A4F"}}>{missingCenters.length}</span>
            </button>
          </div>

          {tab === "missing" && (
            <div style={S.card}>
              <h2 style={{...S.cardTitle, marginBottom:6}}>Centers With No Uploads</h2>
              <p style={{color:"#777", fontSize:13, marginBottom:20}}>{missingCenters.length} of {CENTERS.length} centers have not submitted any documents.</p>
              {missingCenters.length === 0 ? (
                <div style={S.emptyState}>
                  <span style={{fontSize:48}}>🎉</span>
                  <p style={{color:"#2D6A4F", fontWeight:700}}>All centers have submitted!</p>
                </div>
              ) : (
                <div style={{display:"flex", flexDirection:"column", gap:8}}>
                  {missingCenters.map(c => (
                    <div key={c} style={S.missingRow}>
                      <span style={{fontSize:16}}>🏫</span>
                      <span style={{flex:1, fontSize:14, color:"#333"}}>{c}</span>
                      <span style={S.missingBadge}>No uploads</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {tab === "submissions" && (
            <div>
              <div style={S.adminTopRow}>
                <div>
                  <h2 style={S.adminTitle}>Document Submissions</h2>
                  <p style={S.adminSub}>{submissions.length} total · {Object.keys(grouped).length} center{Object.keys(grouped).length !== 1 ? "s" : ""} with submissions</p>
                </div>
                <div style={S.filterRow}>
                  <select style={S.filterSelect} value={filterCenter} onChange={e => setFilterCenter(e.target.value)}>
                    <option value="all">All Centers</option>
                    {CENTERS.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <select style={S.filterSelect} value={filterType} onChange={e => setFilterType(e.target.value)}>
                    <option value="all">All Doc Types</option>
                    {DOC_TYPES.map(dt => <option key={dt.id} value={dt.id}>{dt.label}</option>)}
                  </select>
                </div>
              </div>

              {submissions.length === 0 ? (
                <div style={S.emptyState}><span style={{fontSize:48}}>📭</span><p style={{color:"#777"}}>No submissions yet.</p></div>
              ) : filtered.length === 0 ? (
                <div style={S.emptyState}><span style={{fontSize:48}}>🔍</span><p style={{color:"#777"}}>No submissions match your filters.</p></div>
              ) : (
                Object.entries(grouped).map(([center, subs]) => (
                  <div key={center} style={S.centerGroup}>
                    <div style={S.centerGroupHeader}>
                      <span style={{fontSize:20}}>🏫</span>
                      <span style={S.centerName}>{center}</span>
                      <span style={S.centerCount}>{subs.length} submission{subs.length !== 1 ? "s" : ""}</span>
                    </div>
                    {subs.map(sub => {
                      const dt = getDt(sub.doc_type);
                      return (
                        <div key={sub.id} style={S.submissionRow}>
                          <div style={{...S.docTypeBadge, background:dt.color+"18", color:dt.color}}>
                            {dt.icon} {dt.label}
                          </div>
                          <div style={S.subMeta}>
                            <span style={S.subDate}>{fmtDate(sub.submitted_at)}</span>
                            {sub.notes && <span style={S.subNotes}>"{sub.notes}"</span>}
                          </div>
                          {sub.files && sub.files.length > 0 ? (
                            <div style={S.fileListAdmin}>
                              {sub.files.map((f,i) => (
                                <div key={i} style={S.adminFileChip}>
                                  📄 {f.name} {f.size ? <span style={S.fileSize}>{fmtSize(f.size)}</span> : null}
                                </div>
                              ))}
                            </div>
                          ) : (
                            <p style={{fontSize:12, color:"#aaa", margin:"4px 0 10px"}}>No files attached.</p>
                          )}
                          {sub.files && sub.files.length > 0 && (
                            <button style={S.downloadBtn} onClick={() => downloadAll(sub)}>
                              ⬇ Download All ({sub.files.length})
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      );
    }

    function AdminLogin({ onUnlock }) {
      const [pw,  setPw]  = useState("");
      const [err, setErr] = useState(false);
      const attempt = () => {
        if (pw === ADMIN_PASSWORD) { onUnlock(); }
        else { setErr(true); setPw(""); }
      };
      return (
        <div style={S.container}>
          <div style={{...S.card, maxWidth:400, margin:"0 auto"}}>
            <div style={{textAlign:"center", marginBottom:24}}>
              <span style={{fontSize:40}}>🔒</span>
              <h2 style={{...S.cardTitle, marginBottom:4}}>Admin Access</h2>
              <p style={{color:"#777", fontSize:13, margin:0}}>Enter the admin password to continue</p>
            </div>
            <label style={S.label}>Password</label>
            <input
              type="password"
              style={{...S.select, marginBottom:8, borderColor: err ? "#c0392b" : "#d0e8d8"}}
              placeholder="Enter password…"
              value={pw}
              onChange={e => { setPw(e.target.value); setErr(false); }}
              onKeyDown={e => e.key === "Enter" && attempt()}
            />
            {err && <p style={{color:"#c0392b", fontSize:12, margin:"0 0 12px"}}>⚠️ Incorrect password. Please try again.</p>}
            <button style={S.submitBtn} onClick={attempt}>Unlock Admin →</button>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("none");
      const [toast,  setToast]  = useState(null);

      const showToast = (msg, err=false) => {
        setToast({msg, err});
        setTimeout(() => setToast(null), 3200);
      };

      if (screen === "none") return (
        <div style={S.loginBg}>
          <div style={S.loginCard}>
            <div style={S.logoRow}>
              <img src="https://kah12240.github.io/kah-fleet/kah-logo.png" alt="KAH Logo" style={{height:80, objectFit:"contain"}} />
              <div>
                <div style={S.logoTitle}>Maryland Childcare</div>
                <div style={S.logoSub}>Licensing Document Portal</div>
              </div>
            </div>
            <p style={{color:"#555", marginBottom:28, fontSize:15}}>Select your role to continue</p>
            <div style={S.roleGrid}>
              <button style={S.roleBtn} onClick={() => setScreen("director")}>
                <span style={{fontSize:32}}>🏫</span>
                <span style={{fontSize:13, fontWeight:700, color:"#2D6A4F"}}>Center Director</span>
              </button>
              <button style={S.roleBtn} onClick={() => setScreen("adminLock")}>
                <span style={{fontSize:32}}>🗂️</span>
                <span style={{fontSize:13, fontWeight:700, color:"#2D6A4F"}}>Admin / Owner</span>
              </button>
            </div>
          </div>
          {toast && <Toast toast={toast} />}
        </div>
      );

      if (screen === "director") return (
        <div style={S.appBg}>
          <Header role="director" onSwitch={() => setScreen("none")} />
          <DirectorView showToast={showToast} />
          {toast && <Toast toast={toast} />}
        </div>
      );

      if (screen === "adminLock") return (
        <div style={S.appBg}>
          <Header role="admin" onSwitch={() => setScreen("none")} />
          <AdminLogin onUnlock={() => setScreen("adminOpen")} />
          {toast && <Toast toast={toast} />}
        </div>
      );

      if (screen === "adminOpen") return (
        <div style={S.appBg}>
          <Header role="admin" onSwitch={() => setScreen("none")} />
          <AdminView showToast={showToast} />
          {toast && <Toast toast={toast} />}
        </div>
      );

      return null;
    }

    const S = {
      loginBg:{minHeight:"100vh",background:"linear-gradient(135deg,#e8f5e9,#e3f0fb)",display:"flex",alignItems:"center",justifyContent:"center"},
      loginCard:{background:"#fff",borderRadius:20,padding:"48px 44px",boxShadow:"0 8px 48px rgba(0,0,0,.10)",maxWidth:420,width:"100%",textAlign:"center"},
      logoRow:{display:"flex",alignItems:"center",gap:14,marginBottom:20,justifyContent:"center"},
      logoTitle:{fontSize:20,fontWeight:800,color:"#1a3a2a",textAlign:"left"},
      logoSub:{fontSize:12,color:"#5a7a6a",textAlign:"left",letterSpacing:.5},
      roleGrid:{display:"flex",gap:14,justifyContent:"center"},
      roleBtn:{flex:1,background:"#f4f9f6",border:"2px solid #c8e6c9",borderRadius:14,padding:"20px 14px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10},
      appBg:{minHeight:"100vh",background:"#f6f8f6"},
      header:{background:"#fff",borderBottom:"1px solid #e0ebe4",padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100},
      headerLeft:{display:"flex",alignItems:"center",gap:12},
      headerTitle:{fontSize:16,fontWeight:800,color:"#1a3a2a"},
      headerRole:{fontSize:11,color:"#5a7a6a",letterSpacing:.5},
      switchBtn:{fontSize:12,background:"#eef6ee",border:"1px solid #b2d8b2",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#2D6A4F",fontWeight:600},
      container:{maxWidth:820,margin:"0 auto",padding:"36px 20px"},
      card:{background:"#fff",borderRadius:18,padding:"36px",boxShadow:"0 2px 20px rgba(0,0,0,.06)"},
      cardTitle:{fontSize:22,fontWeight:800,color:"#1a3a2a",marginBottom:24},
      label:{display:"block",fontSize:12,fontWeight:700,color:"#3a5a4a",marginBottom:6,marginTop:18,textTransform:"uppercase",letterSpacing:.8},
      select:{width:"100%",padding:"10px 14px",border:"1.5px solid #d0e8d8",borderRadius:10,fontSize:14,color:"#222",background:"#fafffe",outline:"none",boxSizing:"border-box"},
      docTypeGrid:{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"},
      docTypeBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8,border:"2px solid #e0e8e4",borderRadius:12,padding:"14px 8px",cursor:"pointer",background:"#fff"},
      dropzone:{marginTop:4,border:"2px dashed #b2d8b2",borderRadius:14,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:"#f6fdf7"},
      dropzoneActive:{borderColor:"#2D6A4F",background:"#e8f5ee"},
      dropzoneText:{margin:"8px 0 4px",color:"#444",fontSize:14},
      dropzoneHint:{color:"#888",fontSize:12,margin:0},
      browseLink:{color:"#2D6A4F",fontWeight:700,textDecoration:"underline"},
      fileList:{marginTop:10,display:"flex",flexDirection:"column",gap:6},
      fileChip:{display:"flex",alignItems:"center",gap:8,background:"#f0faf2",border:"1px solid #b2d8b2",borderRadius:8,padding:"7px 12px",fontSize:13},
      fileSize:{color:"#888",fontSize:11,marginLeft:"auto"},
      removeFile:{background:"none",border:"none",color:"#c0392b",cursor:"pointer",fontSize:14,marginLeft:4},
      textarea:{width:"100%",border:"1.5px solid #d0e8d8",borderRadius:10,padding:"10px 14px",fontSize:14,color:"#333",resize:"vertical",background:"#fafffe",boxSizing:"border-box"},
      submitBtn:{marginTop:28,width:"100%",background:"#2D6A4F",color:"#fff",border:"none",borderRadius:12,padding:"15px 0",fontSize:16,fontWeight:800,cursor:"pointer"},
      successBanner:{background:"#e8f5ee",border:"1px solid #b2d8b2",borderRadius:10,padding:"12px 18px",marginBottom:20,color:"#2D6A4F",fontWeight:600,fontSize:14,display:"flex",alignItems:"center",justifyContent:"space-between"},
      dismissBtn:{background:"none",border:"none",color:"#2D6A4F",cursor:"pointer",fontSize:12,fontWeight:600},
      tabRow:{display:"flex",gap:8,marginBottom:20},
