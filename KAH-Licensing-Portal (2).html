    function fmtSize(b) {
      if (b < 1024) return b + " B";

      return (b/1048576).toFixed(1) + " MB";

      const [fType, setFType] = useState("all");

      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef();

      const toast_ = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),4000); };

      useEffect(() => { loadSubs(); }, []);

      async function loadSubs() {
        setLoading(true);
        try {
          const { data, error } = await sb.from("submissions").select("*").order("submitted_at",{ascending:false});
          if (error) throw error;
          setSubs(data||[]);
        } catch(e) { toast_("Could not load: "+(e.message||e),"error"); setSubs([]); }
        setLoading(false);
      }

      const addFiles = (fl) => {
        const n={};
        Array.from(fl).forEach(f=>{n[f.name]=f;});
        setFiles(prev=>({...prev,...n}));
      };

      const handleSubmit = async () => {
        if (!center||!docType||Object.keys(files).length===0) { toast_("Please fill in all fields and attach at least one file.","error"); return; }
        setUploading(true);
        const id = `sub_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
        const recs=[];
        try {
          for (const [name,file] of Object.entries(files)) {
            const safe=name.replace(/[^a-zA-Z0-9._-]/g,"_");
            const path=`${id}/${safe}`;
            const {error:ue}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true});
            if(ue) throw ue;
            const {data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
            recs.push({name,size:file.size,path,url:ud.publicUrl});
          }
          const rec={id,center,doc_type:docType,notes,submitted_at:Date.now(),files:recs};
          const {error:de}=await sb.from("submissions").insert([rec]);
          if(de) throw de;
          setSubs(prev=>[rec,...prev]);
          setSubmitted(true); setFiles({}); setDocType(""); setNotes("");
          toast_(`${recs.length} file(s) uploaded and saved permanently!`);
        } catch(e) { toast_("Upload failed: "+(e.message||e),"error"); }
        setUploading(false);
      };

      const dlFile = (f) => {
        if (!f.url) { toast_("No URL available.","error"); return; }
        const a=document.createElement("a"); a.href=f.url; a.download=f.name; a.target="_blank";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const dlAll = async (sub) => {
        toast_(`Downloading ${sub.files.length} file(s)…`);
        for (const f of sub.files) { dlFile(f); await new Promise(r=>setTimeout(r,400)); }
      };

      const delSub = async (id) => {
        if (!window.confirm("Delete this submission and all its files? This cannot be undone.")) return;
        try {
          const sub=subs.find(s=>s.id===id);
          if (sub&&sub.files&&sub.files.length) await sb.storage.from(BUCKET).remove(sub.files.map(f=>f.path));
          const {error}=await sb.from("submissions").delete().eq("id",id);
          if(error) throw error;
          setSubs(prev=>prev.filter(s=>s.id!==id)); toast_("Submission deleted.");

      };

        adminSub:{color:"#5a7a6a",fontSize:13,marginTop:4},
        fRow:{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"},
        fSel:{padding:"8px 12px",border:"1.5px solid #d0e8d8",borderRadius:8,fontSize:13,background:"#fff",color:"#333"},
        refBtn:{padding:"8px 14px",border:"1.5px solid #d0e8d8",borderRadius:8,fontSize:13,background:"#fff",cursor:"pointer",color:"#2D6A4F",fontWeight:600},
        cGroup:{background:"#fff",borderRadius:16,marginBottom:20,boxShadow:"0 2px 12px rgba(0,0,0,.05)",overflow:"hidden"},
        cHdr:{display:"flex",alignItems:"center",gap:10,padding:"16px 22px",background:"#f0faf2",borderBottom:"1px solid #dff0e4"},
        cIcon:{fontSize:20},
        cName:{fontWeight:800,color:"#1a3a2a",fontSize:15,fontFamily:"'Playfair Display',serif",flex:1},
        cCount:{fontSize:11,color:"#5a7a6a",background:"#d4edda",borderRadius:20,padding:"3px 10px",fontWeight:700},
        sRow:{padding:"18px 22px",borderBottom:"1px solid #f0f4f0"},
        badge:{display:"inline-flex",alignItems:"center",gap:6,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700},
        meta:{display:"flex",gap:14,flexWrap:"wrap",marginBottom:10},
        metaDate:{fontSize:12,color:"#777"},
        metaNotes:{fontSize:12,color:"#444",fontStyle:"italic"},
        fileRow:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12},
        fileBtn:{fontSize:12,background:"#f0faf2",border:"1.5px solid #b2d8b2",borderRadius:8,padding:"6px 12px",color:"#2D6A4F",cursor:"pointer",fontWeight:600},
        dlBtn:{background:"#1D3557",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer"},
        delBtn:{background:"#fff0f0",border:"1px solid #f5c6c6",borderRadius:8,padding:"5px 12px",fontSize:12,color:"#c0392b",cursor:"pointer",fontWeight:600},
        empty:{textAlign:"center",padding:"60px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:14},
        toast_:{position:"fixed",bottom:24,right:24,color:"#fff",padding:"13px 22px",borderRadius:10,fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,.18)",zIndex:999,maxWidth:360},
      };

      const Hdr = ({roleLabel,onSwitch}) => (
        <div style={T.hdr}>
          <div style={T.hdrL}>
            <img src={KAH_LOGO} alt="KAH" style={{height:48,objectFit:"contain"}} />
            <div>
              <div style={T.hdrTitle}>Kids After Hours</div>
              <div style={T.hdrRole}>{roleLabel}</div>
            </div>
          </div>
          <button style={T.switchBtn} onClick={onSwitch}>Switch Role ↩</button>
        </div>
      );

      if (!role) return (
        <div style={T.loginBg}>
          <div style={T.loginCard}>
            <div style={T.logoRow}>
              <img src={KAH_LOGO} alt="KAH" style={{height:72,objectFit:"contain"}} />
              <div>
                <div style={T.logoTitle}>Kids After Hours</div>
                <div style={T.logoSub}>Licensing Document Portal</div>
              </div>
            </div>
            <p style={T.loginDesc}>Select your role to continue</p>
            <div style={T.roleGrid}>
              {ROLES.map(r=>(
                <button key={r.id} style={T.roleBtn} onClick={()=>setRole(r.id)}>
                  <span style={T.roleBtnIcon}>{r.id==="director"?"🏫":"🗂️"}</span>
                  <span style={T.roleBtnLabel}>{r.label}</span>
                </button>
              ))}
            </div>
          </div>
          {toast&&<div style={{...T.toast_,background:toast.type==="error"?"#c0392b":"#2D6A4F"}}>{toast.type==="error"?"⚠️ ":"✅ "}{toast.msg}</div>}
        </div>
      );

      if (role==="director") return (
        <div style={T.appBg}>
          <Hdr roleLabel="Director Submission View" onSwitch={()=>{setRole(null);setSubmitted(false);setCenter("");}} />
          <div style={T.wrap}>
            {submitted&&<div style={T.banner}>✅ Files uploaded and saved to Supabase — admins can see them now!<button style={T.dismissBtn} onClick={()=>setSubmitted(false)}>Dismiss</button></div>}
            <div style={T.card}>
              <h2 style={T.cardTitle}>Submit Licensing Documents</h2>
              <label style={T.lbl}>Your Center *</label>
              <select style={T.sel} value={center} onChange={e=>setCenter(e.target.value)}>
                <option value="">— Select your center —</option>
                {CENTERS.map(c=><option key={c}>{c}</option>)}
              </select>
              <label style={T.lbl}>Document Type *</label>
              <div style={T.dtGrid}>
                {DOC_TYPES.map(dt=>(
                  <button key={dt.id} style={{...T.dtBtn,...(docType===dt.id?{borderColor:dt.color,background:dt.color+"12"}:{})}} onClick={()=>setDocType(dt.id)}>
                    <span style={{fontSize:22}}>{dt.icon}</span>
                    <span style={{fontSize:12,color:docType===dt.id?dt.color:"#444",fontWeight:docType===dt.id?700:500,textAlign:"center",lineHeight:1.3}}>{dt.label}</span>
                  </button>
                ))}
              </div>
              <label style={T.lbl}>Upload Documents *</label>
              <div style={{...T.dz,...(dragOver?T.dzA:{})}}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);addFiles(e.dataTransfer.files);}}
                onClick={()=>fileRef.current.click()}>
                <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e=>addFiles(e.target.files)} />
                <span style={{fontSize:32}}>📁</span>
                <p style={T.dzTxt}>Drag &amp; drop files here, or <span style={T.browse}>browse</span></p>
                <p style={T.dzHint}>PDF, JPG, PNG, DOCX accepted</p>
              </div>
              {Object.keys(files).length>0&&(
                <div style={T.fList}>
                  {Object.entries(files).map(([name,f])=>(
                    <div key={name} style={T.fChip}>
                      <span>📄 {name}</span>
                      <span style={T.fSz}>{fmtSize(f.size)}</span>
                      <button style={T.rmFile} onClick={()=>setFiles(prev=>{const n={...prev};delete n[name];return n;})}>✕</button>
                    </div>
                  ))}
                </div>
              )}
              <label style={T.lbl}>Notes (optional)</label>
              <textarea style={T.ta} rows={3} placeholder="Any additional context for the licensing office…" value={notes} onChange={e=>setNotes(e.target.value)} />
              <button style={{...T.subBtn,opacity:uploading?0.7:1}} onClick={handleSubmit} disabled={uploading}>
                {uploading?"⏳ Uploading to Supabase…":"Submit Documents →"}
              </button>
            </div>
          </div>
          {toast&&<div style={{...T.toast_,background:toast.type==="error"?"#c0392b":"#2D6A4F"}}>{toast.type==="error"?"⚠️ ":"✅ "}{toast.msg}</div>}
        </div>
      );

      return (
        <div style={T.appBg}>
          <Hdr roleLabel="Admin / Owner View" onSwitch={()=>setRole(null)} />
          <div style={T.wrap}>
            <div style={T.adminTop}>
              <div>
                <h2 style={T.adminTitle}>Document Submissions</h2>
                <p style={T.adminSub}>{subs.length} submission{subs.length!==1?"s":""} · {Object.keys(grouped).length} center{Object.keys(grouped).length!==1?"s":""}<span style={{color:"#2D6A4F",fontWeight:700}}> · ☁️ Stored in Supabase</span></p>
              </div>
              <div style={T.fRow}>
                <select style={T.fSel} value={fCenter} onChange={e=>setFCenter(e.target.value)}>
                  <option value="all">All Centers</option>
                  {CENTERS.map(c=><option key={c}>{c}</option>)}
                </select>
                <select style={T.fSel} value={fType} onChange={e=>setFType(e.target.value)}>
                  <option value="all">All Doc Types</option>
                  {DOC_TYPES.map(dt=><option key={dt.id} value={dt.id}>{dt.label}</option>)}
                </select>
                <button style={T.refBtn} onClick={loadSubs}>🔄 Refresh</button>
              </div>
            </div>
            {loading?(
              <div style={T.empty}><span style={{fontSize:36}}>⏳</span><p style={{color:"#777"}}>Loading from Supabase…</p></div>
            ):subs.length===0?(
              <div style={T.empty}><span style={{fontSize:48}}>📭</span><p style={{color:"#777"}}>No submissions yet.</p></div>
            ):filtered.length===0?(
              <div style={T.empty}><span style={{fontSize:48}}>🔍</span><p style={{color:"#777"}}>No submissions match your filters.</p></div>
            ):(
              Object.entries(grouped).map(([c,items])=>(
                <div key={c} style={T.cGroup}>
                  <div style={T.cHdr}>
                    <span style={T.cIcon}>🏫</span>
                    <span style={T.cName}>{c}</span>
                    <span style={T.cCount}>{items.length} submission{items.length!==1?"s":""}</span>
                  </div>
                  {items.map(sub=>{
                    const dt=DOC_TYPES.find(d=>d.id===sub.doc_type);
                    return (
                      <div key={sub.id} style={T.sRow}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:8}}>
                          <div style={{...T.badge,background:(dt?dt.color:"#888")+"18",color:dt?dt.color:"#888"}}>{dt?dt.icon:"📄"} {dt?dt.label:sub.doc_type}</div>
                          <button style={T.delBtn} onClick={()=>delSub(sub.id)}>🗑 Delete</button>
                        </div>
                        <div style={T.meta}>
                          <span style={T.metaDate}>Submitted {fmtDate(sub.submitted_at)}</span>
                          {sub.notes&&<span style={T.metaNotes}>"{sub.notes}"</span>}
                        </div>
                        <div style={T.fileRow}>
                          {(sub.files||[]).map(f=>(
                            <button key={f.name} style={T.fileBtn} onClick={()=>dlFile(f)}>
                              📄 {f.name} <span style={T.fSz}>{fmtSize(f.size)}</span> ⬇
                            </button>
                          ))}
                        </div>
                        {(sub.files||[]).length>1&&(
                          <button style={T.dlBtn} onClick={()=>dlAll(sub)}>⬇ Download All ({sub.files.length})</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))
            )}
          </div>
          {toast&&<div style={{...T.toast_,background:toast.type==="error"?"#c0392b":"#2D6A4F"}}>{toast.type==="error"?"⚠️ ":"✅ "}{toast.msg}</div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
